<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Maç Sonuçları - Editor League</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="logo-area" onclick="window.location.href='index.html'" style="cursor:pointer;">
        <span>⚽</span> EDITOR LEAGUE DB
    </div>
    <div class="nav-links">
        <a href="index.html">Panel</a>
        <a href="oyuncu.html">Oyuncu Profili</a>
        <a href="mac-detay.html" class="active">Maç Detayları</a>
    </div>
</header>

<div class="container">
    <div class="hero" style="text-align: center; margin-bottom: 30px;">
        <h1 id="macSkor">MAÇ GEÇMİŞİ VE DETAYLARI</h1>
        <p id="macTarih" style="margin: 0 auto; color: var(--text-muted);">Lig Maçları Rapor İstasyonu</p>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px; align-items: start;">
        
        <div style="background-color: var(--bg-card); padding: 20px; border-radius: 4px; border: 1px solid var(--border-color);">
            <h4 style="color: var(--accent-yellow); margin-bottom: 15px; text-transform: uppercase; font-size: 14px;">Oynanan Maçlar</h4>
            <div id="macListesiSutun" style="display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; padding-right: 5px;">
                <p style="color: var(--text-muted); font-size: 13px;">Yükleniyor...</p>
            </div>
        </div>

        <div style="background-color: var(--bg-card); padding: 25px; border-radius: 4px; border: 1px solid var(--border-color);">
            <h3 id="detayBaslik" style="color: var(--accent-blue); margin-bottom: 20px; font-size: 16px; text-transform: uppercase;">Maç Detayı Raporu</h3>
            
            <div id="secinizUyarisi" style="color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px 0;">
                Detayları ve oyuncu performans raporunu görmek için sol taraftaki listeden bir maç seç moruk!
            </div>

            <div id="raporIcerikAlani" style="display: none;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Oyuncu İsmi</th>
                            <th style="text-align: center;">Pozisyon</th>
                            <th style="text-align: center; color: var(--accent-red);">G</th>
                            <th style="text-align: center; color: var(--accent-purple);">A</th>
                            <th style="text-align: center; color: var(--accent-yellow);">Puan</th>
                        </tr>
                    </thead>
                    <tbody id="macDetayGövde">
                        </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    const API_URL = 'https://bot-lhr2.onrender.com/api/puan-durumu';
    let ligVerisi = null;

    async function ligMaclariniYukle() {
        try {
            const res = await fetch(API_URL);
            ligVerisi = await res.json();

            const listeKutusu = document.getElementById('macListesiSutun');
            listeKutusu.innerHTML = '';

            if(!ligVerisi.maclar || ligVerisi.maclar.length === 0) {
                listeKutusu.innerHTML = `<p style="color: var(--text-muted); font-size:13px;">Henüz maç verisi yok.</p>`;
                return;
            }

            // Maçları tersten listeliyoruz (en son maç en üstte gözüksün)
            ligVerisi.maclar.forEach((mac, index) => {
                const macBtn = document.createElement('div');
                macBtn.style.cssText = "background: #1a1d2e; border: 1px solid var(--border-color); padding: 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; transition: 0.2s;";
                macBtn.innerHTML = `<span style="color:var(--accent-blue);">${mac.ev}</span> <span style="color:var(--text-muted); font-size:11px;">vs</span> <span style="color:var(--accent-purple);">${mac.dep}</span>`;
                
                macBtn.onmouseenter = () => macBtn.style.borderColor = "var(--accent-yellow)";
                macBtn.onmouseleave = () => macBtn.style.borderColor = "var(--border-color)";
                
                macBtn.onclick = () => macDetayiniGoster(index);
                listeKutusu.appendChild(macBtn);
            });

        } catch(e) {
            console.error("Maç listesi yüklenirken hata:", e);
        }
    }

    function macDetayiniGoster(index) {
        if(!ligVerisi || !ligVerisi.maclar[index]) return;
        
        const mac = ligVerisi.maclar[index];
        
        // Üst başlık skor alanını güncelle
        document.getElementById('macSkor').innerText = `${mac.ev.toUpperCase()} vs ${mac.dep.toUpperCase()}`;
        document.getElementById('detayBaslik').innerText = `⚽ Maç İstatistik Matrisi`;
        
        document.getElementById('secinizUyarisi').style.display = 'none';
        document.getElementById('raporIcerikAlani').style.display = 'block';

        const tbody = document.getElementById('macDetayGövde');
        tbody.innerHTML = '';

        if(mac.detaylar && mac.detaylar.length > 0) {
            mac.detaylar.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: 600; color: #fff;">${p.isim}</td>
                        <td style="text-align: center; font-family: monospace; font-size: 12px; color: var(--text-muted);">${p.mac_pozisyonu || '-'}</td>
                        <td style="text-align: center; font-weight: bold; color: var(--accent-red);">${p.G || 0}</td>
                        <td style="text-align: center; font-weight: bold; color: var(--accent-purple);">${p.A || 0}</td>
                        <td style="text-align: center; font-family: monospace; font-weight: bold; color: var(--accent-yellow);">${p.pso_skor || 0}</td>
                    </tr>
                `;
            });
        } else {
            tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Bu maçın detaylı oyuncu istatistiği kaydedilmemiş.</td></tr>`;
        }
    }

    window.onload = ligMaclariniYukle;
</script>
</body>
</html>
