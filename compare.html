<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>H2H Compare Engine - EDİTOR LEAGUE</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-dark: #07090f; --bg-card: #0f141f; --text-main: #ffffff; --text-muted: #6b7280; --border-color: #1f2937; --color-players: #3b82f6; --color-matches: #ef4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background-color: #05070a; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-brand img { width: 40px; height: 40px; object-fit: contain; }
        .nav-brand span { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; color: #fff; padding-top: 4px; }
        
        .search-bar { background-color: #111827; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 16px; border-radius: 4px; width: 250px; outline: none; }
        .nav-links { display: flex; gap: 20px; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; position: relative; padding-bottom: 5px; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }
        .nav-links a::after { content: ''; position: absolute; width: 0; height: 2px; bottom: 0; left: 0; background-color: var(--color-players); transition: width 0.3s ease; }
        .nav-links a:hover::after { width: 100%; }
        .nav-links a.active::after { width: 100%; background-color: var(--color-matches); }
        
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        /* Arama Kutusu Stilleri */
        .selectors { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .search-wrapper { position: relative; width: 100%; }
        .custom-search { background:var(--bg-card); color:#fff; padding:15px; border:1px solid var(--border-color); border-radius:4px; font-size:1rem; width:100%; outline:none; }
        .search-dropdown { position: absolute; top: 100%; left: 0; width: 100%; background: #1a1a1a; border: 1px solid #333; border-radius: 0 0 6px 6px; max-height: 250px; overflow-y: auto; z-index: 999; display: none; }
        .s-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #2a2a2a; color: white; display: flex; align-items: center; gap: 10px; }
        .s-item:hover { background: #2c5e3b; }
        .s-item img { width: 25px; height: 25px; border-radius: 50%; object-fit: cover; }

        .vs-layout { display: grid; grid-template-columns: 1fr 400px 1fr; gap: 20px; align-items: center; background: var(--bg-card); border: 1px solid var(--border-color); padding: 30px; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .radar-box { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 350px;}
        
        .bar-container { margin-bottom: 15px; }
        .bar-labels { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; font-weight: bold; }
        .bar-track { background: #111827; height: 8px; border-radius: 4px; display: flex; overflow: hidden; }
        .bar-fill-left { background: #3b82f6; height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .bar-fill-right { background: #a855f7; height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); margin-left: auto; }
        
        @media (max-width: 768px) { .vs-layout { grid-template-columns: 1fr; } .radar-box { order: -1; margin-bottom: 20px; height: auto;} }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="https://i.hizliresim.com/gt5bmq6.png" alt="Logo">
            <span>EDİTOR LEAGUE</span>
        </a>
        <input type="text" class="search-bar" placeholder="Ara..." disabled style="opacity: 0.5; cursor: not-allowed;">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="news.html">News</a>
            <a href="players.html">Players</a>
            <a href="matches.html">Matches</a>
            <a href="stats.html">Stats</a>
            <a href="compare.html" class="active">Compare</a>
            <a href="totw.html">TOTW</a>
            <a href="elo.html">ELO</a>
            <a href="standings.html">Standings</a>
        </div>
    </nav>

    <div class="container">
        <div class="selectors">
            <div class="search-wrapper">
                <input type="text" class="custom-search" id="input1" placeholder="1. Oyuncuyu Ara" onkeyup="filterP(1)" onfocus="showDrop(1)">
                <div class="search-dropdown" id="drop1"></div>
            </div>
            <div class="search-wrapper">
                <input type="text" class="custom-search" id="input2" placeholder="2. Oyuncuyu Ara" onkeyup="filterP(2)" onfocus="showDrop(2)">
                <div class="search-dropdown" id="drop2"></div>
            </div>
        </div>

        <div class="vs-layout">
            <div id="left-bars"></div>
            <div class="radar-box">
                <div style="font-weight:900; font-size:2rem; letter-spacing:3px; margin-bottom:10px; color:var(--text-muted);">VS</div>
                <canvas id="radarChart"></canvas>
            </div>
            <div id="right-bars"></div>
        </div>
    </div>

    <script>
        let db = null; let chartInst = null;
        let selectedP1 = null; let selectedP2 = null;

        async function load() {
            const res = await fetch('https://bot-lhr2.onrender.com/api/puan-durumu');
            db = await res.json();
            
            document.addEventListener('click', (e) => {
                if(!e.target.closest('.search-wrapper')) {
                    document.getElementById('drop1').style.display = 'none';
                    document.getElementById('drop2').style.display = 'none';
                }
            });
        }

        function showDrop(id) { filterP(id); document.getElementById(`drop${id}`).style.display = 'block'; }
        
        function filterP(id) {
            let val = document.getElementById(`input${id}`).value.toLowerCase();
            let drop = document.getElementById(`drop${id}`);
            drop.innerHTML = '';
            
            Object.keys(db.oyuncular).filter(n => n.toLowerCase().includes(val)).slice(0,10).forEach(n => {
                let p = db.oyuncular[n];
                drop.innerHTML += `<div class="s-item" onclick="selectP(${id}, '${n}')"><img src="${p.avatar || 'https://via.placeholder.com/150'}">${n}</div>`;
            });
        }

        function selectP(id, name) {
            document.getElementById(`input${id}`).value = name;
            document.getElementById(`drop${id}`).style.display = 'none';
            if(id === 1) selectedP1 = name; else selectedP2 = name;
            if(selectedP1 && selectedP2) compare();
        }

        function truncate(str) { return str.length > 12 ? str.substring(0, 10) + '...' : str; }

        function compare() {
            let p1 = db.oyuncular[selectedP1], p2 = db.oyuncular[selectedP2];
            let metrics = ['O', 'G', 'A', 'INT', 'K'];
            let labels = ['MAÇ KATILIMI', 'GOLLER', 'ASİSTLER', 'MÜDAHALE', 'KURTARIŞ'];
            
            let htmlL = `<div style="text-align:center; margin-bottom:20px; animation:fadeIn 0.5s;"><img src="${p1.avatar||'https://via.placeholder.com/150'}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #3b82f6; margin-bottom:10px;"><h2 style="color:#3b82f6;" title="${selectedP1}">${truncate(selectedP1)}</h2></div>`;
            let htmlR = `<div style="text-align:center; margin-bottom:20px; animation:fadeIn 0.5s;"><img src="${p2.avatar||'https://via.placeholder.com/150'}" style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #a855f7; margin-bottom:10px;"><h2 style="color:#a855f7;" title="${selectedP2}">${truncate(selectedP2)}</h2></div>`;

            metrics.forEach((m, idx) => {
                let v1 = p1[m] || 0, v2 = p2[m] || 0;
                let total = (v1 + v2) || 1;
                let pct1 = (v1 / total) * 100, pct2 = (v2 / total) * 100;
                htmlL += `<div class="bar-container"><div class="bar-labels"><span>${labels[idx]}</span> <span>${v1}</span></div><div class="bar-track"><div class="bar-fill-left" style="width:${pct1}%"></div></div></div>`;
                htmlR += `<div class="bar-container"><div class="bar-labels"><span style="margin-left:auto; margin-right:10px;">${v2}</span> <span>${labels[idx]}</span></div><div class="bar-track"><div class="bar-fill-right" style="width:${pct2}%"></div></div></div>`;
            });
            document.getElementById('left-bars').innerHTML = htmlL; document.getElementById('right-bars').innerHTML = htmlR;

            // Chart.js ile Hover Tooltipli Radar
            if(chartInst) chartInst.destroy();
            const ctx = document.getElementById('radarChart').getContext('2d');
            chartInst = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Maç', 'Gol', 'Asist', 'Müdahale', 'Kurtarış'],
                    datasets: [
                        { label: selectedP1, data: [p1.O, p1.G, p1.A, p1.INT, p1.K], backgroundColor: 'rgba(59, 130, 246, 0.4)', borderColor: '#3b82f6', pointBackgroundColor: '#3b82f6' },
                        { label: selectedP2, data: [p2.O, p2.G, p2.A, p2.INT, p2.K], backgroundColor: 'rgba(168, 85, 247, 0.4)', borderColor: '#a855f7', pointBackgroundColor: '#a855f7' }
                    ]
                },
                options: {
                    scales: { r: { angleLines: { color: '#333' }, grid: { color: '#333' }, pointLabels: { color: '#ccc', font: { size: 12 } }, ticks: { display: false } } },
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', titleFont: { size: 14 } } },
                    maintainAspectRatio: false
                }
            });
        }
        window.onload = load;
    </script>
</body>
</html>
