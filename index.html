<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor League | Hub</title>

    <meta property="og:title" content="⚡ Editor League | Resmi Hub ve Canlı İstatistikler" />
    <meta property="og:description" content="Editor League heyecanı burada! Puan durumu, gol/asist krallıkları, oyuncu kıyaslama motoru ve takım logoları ile canlı hub sistemi." />
    <meta property="og:url" content="https://bevke.github.io/editorleague/" />
    <meta property="og:image" content="https://media.discordapp.net/attachments/1340735808319131678/1516924176714436618/lig_pp.png" /> 
    <meta name="theme-color" content="#38bdf8" />
    
    <link rel="stylesheet" href="style.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>

<header>
    <div class="logo-area" onclick="window.location.href='index.html'" style="cursor:pointer;">
        <span>⚽</span> EDITOR LEAGUE DB
    </div>
    <div class="nav-links">
        <a href="index.html" class="active">Panel</a>
        <a href="oyuncu.html">Oyuncu Profili</a>
        <a href="mac-detay.html">Maç Detayları</a>
    </div>
</header>

<div class="container">
    <div class="database-grid">
        <div class="db-card matches">
            <p>Oynanan Toplam Maç</p>
            <h3 id="totalMatchesCount">0</h3>
        </div>
        <div class="db-card players">
            <p>Kayıtlı Aktif Oyuncu</p>
            <h3 id="totalPlayersCount">0</h3>
        </div>
        <div class="db-card leagues">
            <p>Lig Lideri</p>
            <h3 id="currentLeaderName">Yükleniyor...</h3>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-top: 40px; align-items: start;">
        
        <div style="background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 25px; border-radius: 4px;">
            <h3 style="margin-bottom: 20px; color: var(--accent-blue); font-size: 18px; text-transform: uppercase; letter-spacing: 1px;">Canlı Puan Durumu</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="text-align: center; width: 50px;">#</th>
                        <th>Takım</th>
                        <th style="text-align: center;">O</th>
                        <th style="text-align: center;">G</th>
                        <th style="text-align: center;">B</th>
                        <th style="text-align: center;">M</th>
                        <th style="text-align: center;">AG</th>
                        <th style="text-align: center;">YG</th>
                        <th style="text-align: center;">AV</th>
                        <th style="text-align: center; color: var(--accent-blue);">P</th>
                    </tr>
                </thead>
                <tbody id="puanDurumuBody">
                    </tbody>
            </table>
        </div>

        <div style="display: flex; flex-direction: column; gap: 30px;">
            <div style="background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 25px; border-radius: 4px;">
                <h3 style="margin-bottom: 15px; color: var(--accent-red); font-size: 16px; text-transform: uppercase;">⚽ Gol Krallığı</h3>
                <div id="golKralligiList" style="display: flex; flex-direction: column; gap: 10px;">
                    </div>
            </div>

            <div style="background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 25px; border-radius: 4px;">
                <h3 style="margin-bottom: 15px; color: var(--accent-purple); font-size: 16px; text-transform: uppercase;">🎯 Asist Krallığı</h3>
                <div id="asistKralligiList" style="display: flex; flex-direction: column; gap: 10px;">
                    </div>
            </div>
        </div>

    </div>

    <div style="margin-top: 50px; background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 30px; border-radius: 4px;">
        <h3 style="color: var(--accent-yellow); margin-bottom: 20px; text-transform: uppercase;">👥 OYUNCU KIYASLAMA MOTORU</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <select id="compareSelect1" class="search-input" style="width: 100%; background:#1c2035; color:#fff; border:1px solid var(--border-color); padding:10px;">
                <option value="">1. Oyuncuyu Seç...</option>
            </select>
            <select id="compareSelect2" class="search-input" style="width: 100%; background:#1c2035; color:#fff; border:1px solid var(--border-color); padding:10px;">
                <option value="">2. Oyuncuyu Seç...</option>
            </select>
        </div>

        <div id="compareResultMatrix" style="display: none; background: #0b0c10; border: 1px solid var(--border-color); padding: 20px; border-radius: 4px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; font-weight: bold; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px;">
                <div id="p1Name" style="color: var(--accent-blue);">Oyuncu 1</div>
                <div style="color: var(--text-muted);">İSTATİSTİK</div>
                <div id="p2Name" style="color: var(--accent-purple);">Oyuncu 2</div>
            </div>
            <div id="compareRows" style="display: flex; flex-direction: column; gap: 8px;"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://bot-lhr2.onrender.com/api/puan-durumu';
    let localData = null;

    async function verileriYukle() {
        try {
            const res = await fetch(API_URL);
            localData = await res.json();
            
            // Üst Sayaçlar
            document.getElementById('totalMatchesCount').innerText = localData.maclar ? localData.maclar.length : 0;
            const oyuncuSayisi = localData.oyuncular ? Object.keys(localData.oyuncular).length : 0;
            document.getElementById('totalPlayersCount').innerText = oyuncuSayisi;

            // Puan Durumu Listeleme
            let takimlarDizisi = [];
            if(localData.takimlar) {
                takimlarDizisi = Object.entries(localData.takimlar).map(([isim, veri]) => ({
                    isim, ...veri
                }));
            }
            // Puan, ardından averaj sırası
            takimlarDizisi.sort((a,b) => b.P - a.P || b.averaj - a.averaj);

            if(takimlarDizisi.length > 0) {
                document.getElementById('currentLeaderName').innerText = takimlarDizisi[0].isim;
            }

            const tableBody = document.getElementById('puanDurumuBody');
            tableBody.innerHTML = '';
            takimlarDizisi.forEach((t, i) => {
                tableBody.innerHTML += `
                    <tr>
                        <td style="text-align: center; font-weight: bold; color: var(--text-muted);">${i+1}</td>
                        <td style="font-weight: 600;">${t.isim}</td>
                        <td style="text-align: center;">${t.O || 0}</td>
                        <td style="text-align: center; color: #4cd137;">${t.G || 0}</td>
                        <td style="text-align: center;">${t.B || 0}</td>
                        <td style="text-align: center; color: var(--accent-red);">${t.M || 0}</td>
                        <td style="text-align: center;">${t.AG || 0}</td>
                        <td style="text-align: center;">${t.YG || 0}</td>
                        <td style="text-align: center; font-weight: bold;">${t.averaj >= 0 ? '+' : ''}${t.averaj || 0}</td>
                        <td style="text-align: center; font-weight: bold; color: var(--accent-blue); background-color: rgba(0,210,213,0.03);">${t.P || 0}</td>
                    </tr>
                `;
            });

            // Krallıklar Listesi
            let oyuncularDizisi = [];
            if(localData.oyuncular) {
                oyuncularDizisi = Object.entries(localData.oyuncular).map(([id, veri]) => ({
                    id, ...veri
                }));
            }

            // Gol Krallığı İlk 5
            const golSiralama = [...oyuncularDizisi].sort((a,b) => (b.G || 0) - (a.G || 0)).slice(0, 5);
            const golBox = document.getElementById('golKralligiList');
            golBox.innerHTML = '';
            golSiralama.forEach((o, index) => {
                golBox.innerHTML += `
                    <div style="display: flex; justify-between: space-between; align-items: center; background: #1a1d2e; padding: 10px; border-radius: 4px; border-left: 3px solid var(--accent-red);">
                        <span style="font-size:13px; font-weight:600; color:#fff;">${index+1}. ${o.id}</span>
                        <span style="margin-left: auto; font-weight: bold; color: var(--accent-red); font-family: monospace;">${o.G || 0} G</span>
                    </div>
                `;
            });

            // Asist Krallığı İlk 5
            const asistSiralama = [...oyuncularDizisi].sort((a,b) => (b.A || 0) - (a.A || 0)).slice(0, 5);
            const asistBox = document.getElementById('asistKralligiList');
            asistBox.innerHTML = '';
            asistSiralama.forEach((o, index) => {
                asistBox.innerHTML += `
                    <div style="display: flex; justify-between: space-between; align-items: center; background: #1a1d2e; padding: 10px; border-radius: 4px; border-left: 3px solid var(--accent-purple);">
                        <span style="font-size:13px; font-weight:600; color:#fff;">${index+1}. ${o.id}</span>
                        <span style="margin-left: auto; font-weight: bold; color: var(--accent-purple); font-family: monospace;">${o.A || 0} A</span>
                    </div>
                `;
            });

            // Kıyaslama Seçim Listelerini Doldur
            const s1 = document.getElementById('compareSelect1');
            const s2 = document.getElementById('compareSelect2');
            oyuncularDizisi.sort((a,b) => a.id.localeCompare(b.id)).forEach(o => {
                s1.innerHTML += `<option value="${o.id}">${o.id}</option>`;
                s2.innerHTML += `<option value="${o.id}">${o.id}</option>`;
            });

            const matrisTetikle = () => {
                const p1 = s1.value;
                const p2 = s2.value;
                if(!p1 || !p2) {
                    document.getElementById('compareResultMatrix').style.display = 'none';
                    return;
                }
                document.getElementById('p1Name').innerText = p1;
                document.getElementById('p2Name').innerText = p2;

                const o1 = localData.oyuncular[p1];
                const o2 = localData.oyuncular[p2];

                const kriterler = [
                    { isim: 'Maç (O)', k: 'O' },
                    { isim: 'Gol (G)', k: 'G' },
                    { displayName: 'Asist (A)', k: 'A' },
                    { isim: 'MOTM', k: 'MOTM' },
                    { isim: 'Pas (P)', k: 'P' },
                    { isim: 'Şut (S)', k: 'S' },
                    { isim: 'Top Çalma (T)', k: 'T' },
                    { isim: 'Top Kaybı (TK)', k: 'TK' },
                    { isim: 'Kesme (INT)', k: 'INT' }
                ];

                const rowsContainer = document.getElementById('compareRows');
                rowsContainer.innerHTML = '';

                kriterler.forEach(krit => {
                    const v1 = o1[krit.k] || 0;
                    const v2 = o2[krit.k] || 0;

                    let c1 = "#fff"; let c2 = "#fff";
                    if(krit.k === 'TK') {
                        if(v1 < v2) c1 = "#4cd137"; if(v2 < v1) c2 = "#4cd137";
                    } else {
                        if(v1 > v2) c1 = "#4cd137"; if(v2 > v1) c2 = "#4cd137";
                    }

                    rowsContainer.innerHTML += `
                        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; font-family: monospace; font-size: 14px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.02);">
                            <span style="color: ${c1}; font-weight: bold;">${v1}</span>
                            <span style="color: var(--text-muted); font-size: 12px;">${krit.isim || krit.displayName}</span>
                            <span style="color: ${c2}; font-weight: bold;">${v2}</span>
                        </div>
                    `;
                });

                document.getElementById('compareResultMatrix').style.style.display = 'block';
            };

            s1.addEventListener('change', matrisTetikle);
            s2.addEventListener('change', matrisTetikle);

        } catch(e) {
            console.error("Hata:", e);
        }
    }

    window.onload = verileriYukle;
</script>
</body>
</html>
