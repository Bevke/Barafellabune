<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Oyuncu Profili - Editor League</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="logo-area" onclick="window.location.href='index.html'" style="cursor:pointer;">
        <span>⚽</span> EDITOR LEAGUE DB
    </div>
    <div class="nav-links">
        <a href="index.html">Panel</a>
        <a href="oyuncu.html" class="active">Oyuncu Profili</a>
        <a href="mac-detay.html">Maç Detayları</a>
    </div>
</header>

<div class="container">
    
    <div style="background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; margin-bottom: 20px; display: flex; align-items: center; justify-between: space-between; gap: 20px;">
        <span style="font-size: 14px; color: var(--text-muted); font-weight: 600;">PROFİL DEĞİŞTİR:</span>
        <select id="profileDropdown" style="background: #1c2035; color: #fff; border: 1px solid var(--border-color); padding: 8px 15px; border-radius: 4px; width: 250px;" onchange="window.location.href='oyuncu.html?id=' + this.value">
            <option value="">Bir Oyuncu Seçin...</option>
        </select>
    </div>

    <div id="profilKarti" style="background-color: var(--bg-card); border: 1px solid var(--border-color); padding: 40px; border-radius: 4px; display: flex; gap: 30px; align-items: center; border-left: 5px solid var(--accent-yellow);">
        <div id="playerAvatarArea" style="width: 80px; height: 80px; border-radius: 50%; background: #0b0c10; display: flex; align-items: center; justify-content: center; font-size: 44px; overflow: hidden;">
            🏃‍♂️
        </div>
        <div>
            <h1 id="oyuncuAdi" style="font-size: 36px; font-weight: 800;">Oyuncu Seçiniz</h1>
            <p id="oyuncuTakim" style="color: var(--accent-blue); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">TAKIM BİLGİSİ</p>
            <p id="oyuncuMevki" style="color: var(--text-muted); font-size: 12px; font-family: monospace; margin-top: 4px;">Mevki: -</p>
        </div>
    </div>

    <h3 style="margin-top: 40px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; font-size: 16px;">📊 Sezon Performans Verileri</h3>
    <div class="database-grid">
        <div class="db-card matches" style="text-align: center; padding: 20px;">
            <p>Toplam Maç (O)</p>
            <h2 id="pMac" style="font-size: 36px; color: var(--text-main);">0</h2>
        </div>
        <div class="db-card players" style="text-align: center; padding: 20px;">
            <p>Goller</p>
            <h2 id="pGol" style="font-size: 36px; color: var(--text-main);">0</h2>
        </div>
        <div class="db-card leagues" style="text-align: center; padding: 20px;">
            <p>Asistler</p>
            <h2 id="pAsist" style="font-size: 36px; color: var(--text-main);">0</h2>
        </div>
        <div class="db-card teams" style="text-align: center; padding: 20px;">
            <p>Maçın Oyuncusu (MOTM)</p>
            <h2 id="pMotm" style="font-size: 36px; color: var(--accent-yellow);">0</h2>
        </div>
    </div>

    <div style="margin-top: 30px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
        <div style="background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; text-align: center;">
            <span style="font-size: 12px; color: var(--text-muted);">Toplam Pas (P)</span>
            <div id="pPas" style="font-size: 20px; font-weight: bold; margin-top: 5px; font-family: monospace;">0</div>
        </div>
        <div style="background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; text-align: center;">
            <span style="font-size: 12px; color: var(--text-muted);">Toplam Şut (S)</span>
            <div id="pSut" style="font-size: 20px; font-weight: bold; margin-top: 5px; font-family: monospace;">0</div>
        </div>
        <div style="background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; text-align: center;">
            <span style="font-size: 12px; color: var(--text-muted);">Top Çalma (T)</span>
            <div id="pCalma" style="font-size: 20px; font-weight: bold; margin-top: 5px; font-family: monospace;">0</div>
        </div>
        <div style="background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: 4px; text-align: center;">
            <span style="font-size: 12px; color: var(--text-muted);">Top Kaybı (TK)</span>
            <div id="pKayip" style="font-size: 20px; font-weight: bold; margin-top: 5px; font-family: monospace; color: var(--accent-red);">0</div>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://bot-lhr2.onrender.com/api/puan-durumu';
    const urlParams = new URLSearchParams(window.location.search);
    const oyuncuId = urlParams.get('id');

    async function oyuncuDetayYukle() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();

            // Açılır menüyü listeyle doldur
            const dropdown = document.getElementById('profileDropdown');
            Object.keys(data.oyuncular || {}).sort().forEach(id => {
                const opt = document.createElement('option');
                opt.value = id;
                opt.innerText = id;
                if(id === oyuncuId) opt.selected = true;
                dropdown.appendChild(opt);
            });

            // Eğer URL parametresi varsa o oyuncunun profilini bas
            if(oyuncuId && data.oyuncular && data.oyuncular[oyuncuId]) {
                const oyuncu = data.oyuncular[oyuncuId];
                
                document.getElementById('oyuncuAdi').innerText = oyuncu.futbolcu_ismi || oyuncuId;
                document.getElementById('oyuncuTakim').innerText = oyuncu.takim || 'SERBEST OYUNCU';
                document.getElementById('oyuncuMevki').innerText = 'Mevki: ' + (oyuncu.mevki || 'Belirtilmemiş');
                
                // İstatistik Eşlemeleri
                document.getElementById('pMac').innerText = oyuncu.O || 0;
                document.getElementById('pGol').innerText = oyuncu.G || 0;
                document.getElementById('pAsist').innerText = oyuncu.A || 0;
                document.getElementById('pMotm').innerText = oyuncu.MOTM || 0;
                
                document.getElementById('pPas').innerText = oyuncu.P || 0;
                document.getElementById('pSut').innerText = oyuncu.S || 0;
                document.getElementById('pCalma').innerText = oyuncu.T || 0;
                document.getElementById('pKayip').innerText = oyuncu.TK || 0;

                // Discord Avatar Entegrasyonu
                if(oyuncu.avatar) {
                    document.getElementById('playerAvatarArea').innerHTML = `<img src="${oyuncu.avatar}" style="width:100%; height:100%; object-cover: cover;">`;
                }
            }
        } catch(e) {
            console.error("Profil datası çekilirken hata oluştu:", e);
        }
    }

    window.onload = oyuncuDetayYukle;
</script>
</body>
</html>
